name: Test Email Broadcast

# Manually-triggered test that sends the "most recent digest" email to
# MailerLite subscribers without regenerating anything (no LLM calls).
# Useful for verifying the MailerLite campaign flow end-to-end at zero cost.

on:
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # Same deps as the main workflow — paper_search.py imports openai/
        # anthropic/numpy at module load, even though send_digest_email only
        # needs requests.
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy openai anthropic

      - name: Send test email
        # Even though the test only hits MailerLite, importing paper_search.py
        # validates the other API keys at module load — so all of them must
        # be present for the import to succeed. They won't be USED at runtime.
        env:
          MAILERLITE_API_TOKEN: ${{ secrets.MAILERLITE_API_TOKEN }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 test_email.py
