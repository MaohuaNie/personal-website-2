name: Update Research Digest

on:
  schedule:
    # Runs at 00:00 on the 3rd and 17th of every month
    - cron: '0 0 3,17 * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy openai

      - name: Run digest update
        env:
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: bash update_digest.sh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add research-digest/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update research digest $(date +'%Y-%m-%d')" && git push)
